apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ankiety-live
  labels:
    app.kubernetes.io/name: ankiety-live
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: ankiety-live
  labels:
    app.kubernetes.io/name: ankiety-live
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
