<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ankiety — Panel głosowania</title>
    <meta name="description" content="System ankiet i głosowań z wynikami w czasie rzeczywistym">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #1f1f35;
            --border: #2a2a40;
            --border-glow: #6c5ce7;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #555570;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --accent-glow: rgba(108, 92, 231, 0.3);
            --success: #00cec9;
            --success-glow: rgba(0, 206, 201, 0.2);
            --danger: #ff6b6b;
            --warning: #feca57;
            --gradient-1: linear-gradient(135deg, #6c5ce7, #a29bfe);
            --gradient-2: linear-gradient(135deg, #00cec9, #55efc4);
            --gradient-3: linear-gradient(135deg, #fd79a8, #e84393);
            --gradient-4: linear-gradient(135deg, #fdcb6e, #f39c12);
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 30px rgba(108, 92, 231, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background animation */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(108, 92, 231, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 70% 70%, rgba(0, 206, 201, 0.04) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes bgShift {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(-5%, -5%);
            }
        }

        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
        }

        .auth-overlay.hidden {
            display: none;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 24px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo .logo-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: var(--gradient-1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .auth-logo h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .auth-logo p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow);
        }

        .auth-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: var(--bg-secondary);
            border-radius: var(--radius-sm);
            padding: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .auth-tab:hover {
            color: var(--text-primary);
        }

        .auth-tab.active {
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: var(--shadow);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .auth-error {
            padding: 12px 16px;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: var(--radius-sm);
            color: var(--danger);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            display: none;
        }

        .auth-error.show {
            display: block;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 22px;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gradient-1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ws-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            padding: 8px 16px;
            background: var(--bg-card);
            border-radius: 100px;
            border: 1px solid var(--border);
        }

        .ws-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
            transition: background 0.3s;
        }

        .ws-dot.connected {
            background: var(--success);
            box-shadow: 0 0 8px var(--success-glow);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-card);
            border-radius: 100px;
            border: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .user-badge .role-tag {
            padding: 2px 8px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .role-tag.admin {
            background: rgba(253, 121, 168, 0.2);
            color: #fd79a8;
            border: 1px solid rgba(253, 121, 168, 0.3);
        }

        .role-tag.user {
            background: var(--accent-glow);
            color: var(--accent-light);
            border: 1px solid rgba(108, 92, 231, 0.3);
        }

        .btn-logout {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: 100px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255, 107, 107, 0.1);
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Layout */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 32px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 4px;
            border: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            padding: 14px 24px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: var(--shadow);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Create Survey Form */
        .create-form {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow);
        }

        .form-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }

        input:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-row {
            display: flex;
            gap: 10px;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        .option-row input {
            flex: 1;
        }

        .btn-remove {
            width: 42px;
            height: 42px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--danger);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-remove:hover {
            background: rgba(255, 107, 107, 0.1);
            border-color: var(--danger);
        }

        .btn-add {
            padding: 12px;
            background: transparent;
            border: 2px dashed var(--border);
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-add:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: var(--gradient-1);
            border: none;
            color: white;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Survey List */
        .survey-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .survey-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .survey-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .survey-card:hover {
            border-color: var(--border-glow);
            background: var(--bg-card-hover);
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
        }

        .survey-card:hover::before {
            opacity: 1;
        }

        .survey-card h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .survey-card p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .survey-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: var(--text-muted);
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-active {
            background: var(--success-glow);
            color: var(--success);
            border: 1px solid rgba(0, 206, 201, 0.3);
        }

        .badge-inactive {
            background: rgba(255, 107, 107, 0.1);
            color: var(--danger);
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .survey-owner {
            font-size: 12px;
            color: var(--text-muted);
        }

        .survey-actions {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .survey-card:hover .survey-actions {
            opacity: 1;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .btn-icon.danger:hover {
            background: rgba(255, 107, 107, 0.1);
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Vote Panel */
        .vote-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow);
        }

        .vote-panel h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .vote-panel .description {
            color: var(--text-secondary);
            margin-bottom: 24px;
            font-size: 15px;
        }

        .vote-option {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .vote-option:hover {
            border-color: var(--accent);
            background: rgba(108, 92, 231, 0.05);
        }

        .vote-option.selected {
            border-color: var(--accent);
            background: rgba(108, 92, 231, 0.1);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .vote-option.disabled {
            opacity: 0.6;
            cursor: default;
        }

        .vote-radio {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .vote-option.selected .vote-radio {
            border-color: var(--accent);
            background: var(--accent);
        }

        .vote-option.selected .vote-radio::after {
            content: '✓';
            color: white;
            font-size: 13px;
            font-weight: 700;
        }

        .vote-option-text {
            font-weight: 500;
            font-size: 16px;
            flex: 1;
        }

        .btn-vote {
            margin-top: 20px;
            width: 100%;
            padding: 16px;
            font-size: 16px;
        }

        .already-voted {
            margin-top: 16px;
            padding: 16px 20px;
            background: var(--success-glow);
            border: 1px solid rgba(0, 206, 201, 0.3);
            border-radius: var(--radius-sm);
            color: var(--success);
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .results-section {
            margin-top: 32px;
        }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .results-header h3 {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .live-badge {
            padding: 4px 12px;
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
            animation: livePulse 2s infinite;
        }

        @keyframes livePulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .live-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #ff6b6b;
            border-radius: 50%;
        }

        .total-votes {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .result-bar {
            margin-bottom: 16px;
            animation: fadeIn 0.3s ease;
        }

        .result-bar-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .result-bar-label {
            font-weight: 600;
        }

        .result-bar-stats {
            color: var(--text-secondary);
        }

        .result-bar-pct {
            font-weight: 700;
            color: var(--accent-light);
        }

        .result-bar-track {
            height: 12px;
            background: var(--bg-secondary);
            border-radius: 100px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .result-bar-fill {
            height: 100%;
            border-radius: 100px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 0;
        }

        .bar-color-0 {
            background: var(--gradient-1);
        }

        .bar-color-1 {
            background: var(--gradient-2);
        }

        .bar-color-2 {
            background: var(--gradient-3);
        }

        .bar-color-3 {
            background: var(--gradient-4);
        }

        .bar-color-4 {
            background: linear-gradient(135deg, #74b9ff, #0984e3);
        }

        .bar-color-5 {
            background: linear-gradient(135deg, #dfe6e9, #636e72);
        }

        .btn-back {
            padding: 10px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .btn-back:hover {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--shadow);
            z-index: 1000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--success);
        }

        .toast.error {
            border-color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 80px 32px;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 20px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
        }

        .vote-flash {
            animation: flash 0.5s ease;
        }

        @keyframes flash {

            0%,
            100% {
                background: var(--bg-secondary);
            }

            50% {
                background: rgba(108, 92, 231, 0.15);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .header {
                padding: 12px 16px;
            }

            .header-right {
                gap: 8px;
            }

            .survey-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .user-badge span.username-text {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="logo-icon">📊</div>
                <h1>Ankiety</h1>
                <p>System ankiet i głosowań w czasie rzeczywistym</p>
            </div>
            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchAuthTab('login')" id="authTabLogin">🔑
                        Logowanie</button>
                    <button class="auth-tab" onclick="switchAuthTab('register')" id="authTabRegister">📝
                        Rejestracja</button>
                </div>

                <div class="auth-error" id="authError"></div>

                <!-- Login Form -->
                <div class="auth-form active" id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="adres@email.pl" autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label>Hasło</label>
                        <input type="password" id="loginPassword" placeholder="••••••••"
                            autocomplete="current-password">
                    </div>
                    <button class="btn-primary btn-vote" onclick="handleLogin()" id="btnLogin">🔑 Zaloguj się</button>
                </div>

                <!-- Register Form -->
                <div class="auth-form" id="registerForm">
                    <div class="form-group">
                        <label>Nazwa użytkownika</label>
                        <input type="text" id="regUsername" placeholder="np. jan_kowalski" autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="regEmail" placeholder="adres@email.pl" autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label>Hasło (min. 6 znaków)</label>
                        <input type="password" id="regPassword" placeholder="••••••••" autocomplete="new-password">
                    </div>
                    <button class="btn-primary btn-vote" onclick="handleRegister()" id="btnRegister">📝 Zarejestruj
                        się</button>
                </div>
            </div>
        </div>
    </div>

    <header class="header">
        <div class="logo">
            <div class="logo-icon">📊</div>
            <span>Ankiety</span>
        </div>
        <div class="header-right">
            <div class="ws-status">
                <span class="ws-dot" id="wsDot"></span>
                <span id="wsLabel">Rozłączony</span>
            </div>
            <div class="user-badge" id="userBadge">
                <span class="role-tag user" id="roleTag">user</span>
                <span class="username-text" id="usernameDisplay">—</span>
            </div>
            <button class="btn-logout" onclick="handleLogout()">Wyloguj</button>
        </div>
    </header>

    <div class="container">
        <div class="tabs" id="mainTabs">
            <button class="tab active" onclick="switchTab('surveys')">📋 Ankiety</button>
            <button class="tab" onclick="switchTab('create')">✨ Nowa ankieta</button>
        </div>

        <div class="tab-content active" id="tab-surveys">
            <div id="surveyList" class="survey-grid"></div>
        </div>

        <div class="tab-content" id="tab-create">
            <div class="create-form">
                <div class="form-title">✨ Utwórz nową ankietę</div>
                <div class="form-group">
                    <label>Tytuł ankiety</label>
                    <input type="text" id="surveyTitle" placeholder="np. Ulubiony język programowania">
                </div>
                <div class="form-group">
                    <label>Opis (opcjonalny)</label>
                    <textarea id="surveyDesc" placeholder="Krótki opis ankiety..."></textarea>
                </div>
                <div class="form-group">
                    <label>Opcje odpowiedzi</label>
                    <div class="options-list" id="optionsList">
                        <div class="option-row">
                            <input type="text" placeholder="Opcja 1" class="option-input">
                            <button class="btn-remove" onclick="removeOption(this)">×</button>
                        </div>
                        <div class="option-row">
                            <input type="text" placeholder="Opcja 2" class="option-input">
                            <button class="btn-remove" onclick="removeOption(this)">×</button>
                        </div>
                    </div>
                    <button class="btn-add" onclick="addOption()" style="margin-top:10px;width:100%">+ Dodaj
                        opcję</button>
                </div>
                <button class="btn-primary btn-vote" onclick="createSurvey()">🚀 Utwórz ankietę</button>
            </div>
        </div>

        <div class="tab-content" id="tab-vote">
            <button class="btn-back" onclick="backToList()">← Powrót do listy</button>
            <div class="vote-panel" id="votePanel"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_URL = '';
        const VOTE_URL = '';
        const WS_URL = `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}/ws`;

        let ws = null;
        let currentSurvey = null;
        let selectedOption = null;
        let currentResults = null;
        let optionCount = 2;
        let currentUser = null;
        let authToken = null;

        function getToken() {
            return localStorage.getItem('ankiety_token');
        }

        function setToken(token) {
            localStorage.setItem('ankiety_token', token);
            authToken = token;
        }

        function clearToken() {
            localStorage.removeItem('ankiety_token');
            localStorage.removeItem('ankiety_user');
            authToken = null;
            currentUser = null;
        }

        function getStoredUser() {
            try {
                return JSON.parse(localStorage.getItem('ankiety_user'));
            } catch { return null; }
        }

        function setStoredUser(user) {
            localStorage.setItem('ankiety_user', JSON.stringify(user));
            currentUser = user;
        }

        function authHeaders() {
            const token = getToken();
            if (!token) return {};
            return { 'Authorization': `Bearer ${token}` };
        }

        function switchAuthTab(tab) {
            document.getElementById('authTabLogin').classList.toggle('active', tab === 'login');
            document.getElementById('authTabRegister').classList.toggle('active', tab === 'register');
            document.getElementById('loginForm').classList.toggle('active', tab === 'login');
            document.getElementById('registerForm').classList.toggle('active', tab === 'register');
            document.getElementById('authError').classList.remove('show');
        }

        function showAuthError(msg) {
            const el = document.getElementById('authError');
            el.textContent = msg;
            el.classList.add('show');
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showAuthError('Podaj email i hasło');
                return;
            }

            document.getElementById('btnLogin').disabled = true;
            document.getElementById('btnLogin').textContent = '⏳ Logowanie...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const json = await res.json();

                if (!res.ok) {
                    showAuthError(json.message || 'Błąd logowania');
                    return;
                }

                setToken(json.data.token);
                setStoredUser(json.data.user);
                onAuthSuccess();
            } catch (err) {
                showAuthError('Błąd połączenia z serwerem');
            } finally {
                document.getElementById('btnLogin').disabled = false;
                document.getElementById('btnLogin').textContent = '🔑 Zaloguj się';
            }
        }

        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;

            if (!username || !email || !password) {
                showAuthError('Wypełnij wszystkie pola');
                return;
            }

            document.getElementById('btnRegister').disabled = true;
            document.getElementById('btnRegister').textContent = '⏳ Rejestracja...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const json = await res.json();

                if (!res.ok) {
                    showAuthError(json.message || 'Błąd rejestracji');
                    return;
                }

                setToken(json.data.token);
                setStoredUser(json.data.user);
                onAuthSuccess();
            } catch (err) {
                showAuthError('Błąd połączenia z serwerem');
            } finally {
                document.getElementById('btnRegister').disabled = false;
                document.getElementById('btnRegister').textContent = '📝 Zarejestruj się';
            }
        }

        function onAuthSuccess() {
            document.getElementById('authOverlay').classList.add('hidden');
            updateUserUI();
            connectWS();
            loadSurveys();
        }

        function handleLogout() {
            if (ws) ws.close();
            clearToken();
            currentSurvey = null;
            selectedOption = null;
            currentResults = null;
            document.getElementById('authOverlay').classList.remove('hidden');
            document.getElementById('authError').classList.remove('show');
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('wsDot').classList.remove('connected');
            document.getElementById('wsLabel').textContent = 'Rozłączony';
        }

        function updateUserUI() {
            if (!currentUser) return;
            document.getElementById('usernameDisplay').textContent = currentUser.username;
            const roleTag = document.getElementById('roleTag');
            roleTag.textContent = currentUser.role;
            roleTag.className = `role-tag ${currentUser.role}`;
        }

        async function initAuth() {
            const token = getToken();
            const user = getStoredUser();

            if (token && user) {
                try {
                    const res = await fetch('/api/auth/me', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        const json = await res.json();
                        authToken = token;
                        setStoredUser(json.data);
                        onAuthSuccess();
                        return;
                    }
                } catch { }
                clearToken();
            }

            document.getElementById('authOverlay').classList.remove('hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') return;
            if (!document.getElementById('authOverlay').classList.contains('hidden')) {
                if (document.getElementById('loginForm').classList.contains('active')) {
                    handleLogin();
                } else {
                    handleRegister();
                }
            }
        });

        function connectWS() {
            const token = getToken();
            if (!token) return;

            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                ws.send(JSON.stringify({ type: 'auth', token }));
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);

                if (msg.type === 'authenticated') {
                    document.getElementById('wsDot').classList.add('connected');
                    document.getElementById('wsLabel').textContent = 'Live';
                    // Jeśli jesteśmy na stronie ankiety, subskrybuj
                    if (currentSurvey) {
                        ws.send(JSON.stringify({ type: 'subscribe', surveyId: currentSurvey.id }));
                    }
                }

                if (msg.type === 'auth_error') {
                    console.error('WS auth error:', msg.message);
                    document.getElementById('wsLabel').textContent = 'Auth error';
                }

                if (msg.type === 'results' && msg.data) {
                    currentResults = msg.data;
                    renderResults(msg.data);
                }

                if (msg.type === 'vote_received') {
                    const bars = document.querySelectorAll('.result-bar');
                    bars.forEach(b => {
                        b.classList.remove('vote-flash');
                        void b.offsetWidth;
                        b.classList.add('vote-flash');
                    });
                }
            };

            ws.onclose = () => {
                document.getElementById('wsDot').classList.remove('connected');
                document.getElementById('wsLabel').textContent = 'Rozłączony';
                // Reconnect only if still logged in
                if (getToken()) {
                    setTimeout(connectWS, 3000);
                }
            };

            ws.onerror = () => ws.close();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            if (tab === 'surveys') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('tab-surveys').classList.add('active');
                loadSurveys();
            } else if (tab === 'create') {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('tab-create').classList.add('active');
            }
        }

        function backToList() {
            if (ws && currentSurvey && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'unsubscribe', surveyId: currentSurvey.id }));
            }
            currentSurvey = null;
            selectedOption = null;
            currentResults = null;
            document.getElementById('mainTabs').style.display = 'flex';
            switchTab('surveys');
        }

        async function loadSurveys() {
            try {
                const res = await fetch(`${API_URL}/api/surveys`, {
                    headers: { ...authHeaders() }
                });
                const json = await res.json();
                renderSurveyList(json.data);
            } catch (err) {
                showToast('Nie udało się pobrać ankiet', 'error');
            }
        }

        function canModify(survey) {
            if (!currentUser) return false;
            if (currentUser.role === 'admin') return true;
            return survey.owner_id === currentUser.id;
        }

        function renderSurveyList(surveys) {
            const el = document.getElementById('surveyList');
            if (!surveys || surveys.length === 0) {
                el.innerHTML = `
                <div class="empty-state" style="grid-column:1/-1">
                    <div class="icon">📭</div>
                    <h3>Brak ankiet</h3>
                    <p>Utwórz swoją pierwszą ankietę klikając "Nowa ankieta"</p>
                </div>`;
                return;
            }

            el.innerHTML = surveys.map(s => `
            <div class="survey-card" onclick="openSurvey('${s.id}')">
                ${canModify(s) ? `
                    <div class="survey-actions">
                        <button class="btn-icon danger" onclick="event.stopPropagation(); deleteSurvey('${s.id}')" title="Usuń">🗑️</button>
                    </div>
                ` : ''}
                <h3>${escHtml(s.title)}</h3>
                <p>${s.description ? escHtml(s.description) : 'Brak opisu'}</p>
                <div class="survey-meta">
                    <span class="badge ${s.is_active ? 'badge-active' : 'badge-inactive'}">
                        ${s.is_active ? '● Aktywna' : '○ Nieaktywna'}
                    </span>
                    <span class="survey-owner">👤 ${s.owner_username || 'Nieznany'}</span>
                    <span>${new Date(s.created_at).toLocaleDateString('pl-PL')}</span>
                </div>
            </div>
        `).join('');
        }

        async function openSurvey(id) {
            try {
                const [surveyRes, resultsRes] = await Promise.all([
                    fetch(`${API_URL}/api/surveys/${id}`, { headers: { ...authHeaders() } }),
                    fetch(`${API_URL}/api/surveys/${id}/results`)
                ]);
                const survey = await surveyRes.json();
                const results = await resultsRes.json();

                currentSurvey = survey.data;
                currentResults = results.data;
                selectedOption = null;

                // Hide tabs, show vote panel
                document.getElementById('mainTabs').style.display = 'none';
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById('tab-vote').classList.add('active');

                renderVotePanel();
                renderResults(currentResults);

                // Subscribe via WebSocket
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'subscribe', surveyId: id }));
                }
            } catch (err) {
                showToast('Nie udało się otworzyć ankiety', 'error');
            }
        }

        function renderVotePanel() {
            const panel = document.getElementById('votePanel');
            const hasVoted = currentSurvey.user_vote !== null && currentSurvey.user_vote !== undefined;
            const isActive = currentSurvey.is_active;

            panel.innerHTML = `
            <h2>${escHtml(currentSurvey.title)}</h2>
            ${currentSurvey.description ? `<p class="description">${escHtml(currentSurvey.description)}</p>` : ''}
            <div style="margin-bottom:20px;font-size:13px;color:var(--text-muted)">
                Utworzona przez: <strong style="color:var(--text-secondary)">${escHtml(currentSurvey.owner_username || 'Nieznany')}</strong>
            </div>

            <div id="optionsContainer">
                ${currentSurvey.options.map((opt) => `
                    <div class="vote-option ${hasVoted && currentSurvey.user_vote === opt.id ? 'selected' : ''} ${hasVoted || !isActive ? 'disabled' : ''}"
                         ${!hasVoted && isActive ? `onclick="selectOption('${opt.id}', this)"` : ''}
                         data-option-id="${opt.id}">
                        <div class="vote-radio"></div>
                        <span class="vote-option-text">${escHtml(opt.text)}</span>
                    </div>
                `).join('')}
            </div>

            ${hasVoted ? `
                <div class="already-voted">✅ Oddałeś już głos w tej ankiecie</div>
            ` : isActive ? `
                <button class="btn-primary btn-vote" onclick="submitVote()" id="btnVote">
                    🗳️ Zagłosuj
                </button>
            ` : `
                <div class="already-voted" style="background:rgba(255,107,107,0.1);border-color:rgba(255,107,107,0.3);color:var(--danger)">
                    🔒 Ta ankieta jest nieaktywna
                </div>
            `}

            ${canModify(currentSurvey) ? `
                <div style="margin-top:16px;display:flex;gap:10px">
                    <button class="btn-back" onclick="toggleSurveyActive('${currentSurvey.id}', ${!isActive})" style="margin-bottom:0">
                        ${isActive ? '⏸️ Dezaktywuj' : '▶️ Aktywuj'}
                    </button>
                    <button class="btn-back" onclick="deleteSurvey('${currentSurvey.id}')" style="margin-bottom:0;color:var(--danger);border-color:rgba(255,107,107,0.3)">
                        🗑️ Usuń ankietę
                    </button>
                </div>
            ` : ''}

            <div class="results-section" id="resultsSection"></div>
        `;
        }

        function selectOption(optionId, el) {
            selectedOption = optionId;
            document.querySelectorAll('.vote-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
        }

        async function submitVote() {
            if (!selectedOption) {
                showToast('Wybierz opcję przed głosowaniem', 'error');
                return;
            }

            const btn = document.getElementById('btnVote');
            btn.disabled = true;
            btn.textContent = '⏳ Wysyłanie...';

            try {
                const res = await fetch(`/api/votes`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...authHeaders()
                    },
                    body: JSON.stringify({
                        surveyId: currentSurvey.id,
                        optionId: selectedOption
                    })
                });

                const json = await res.json();
                if (res.ok) {
                    showToast('✅ Głos przyjęty! Wyniki zaktualizują się automatycznie.', 'success');
                    currentSurvey.user_vote = selectedOption;
                    renderVotePanel();
                    renderResults(currentResults);
                } else {
                    showToast(json.message || 'Błąd głosowania', 'error');
                    btn.disabled = false;
                    btn.textContent = '🗳️ Zagłosuj';
                }
            } catch (err) {
                showToast('Błąd połączenia z serwerem', 'error');
                btn.disabled = false;
                btn.textContent = '🗳️ Zagłosuj';
            }
        }

        async function deleteSurvey(id) {
            if (!confirm('Czy na pewno chcesz usunąć tę ankietę?')) return;

            try {
                const res = await fetch(`/api/surveys/${id}`, {
                    method: 'DELETE',
                    headers: { ...authHeaders() }
                });

                if (res.ok || res.status === 204) {
                    showToast('🗑️ Ankieta usunięta', 'success');
                    if (currentSurvey && currentSurvey.id === id) {
                        backToList();
                    } else {
                        loadSurveys();
                    }
                } else {
                    const json = await res.json();
                    showToast(json.message || 'Błąd usuwania', 'error');
                }
            } catch (err) {
                showToast('Błąd połączenia', 'error');
            }
        }

        async function toggleSurveyActive(id, active) {
            try {
                const res = await fetch(`/api/surveys/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        ...authHeaders()
                    },
                    body: JSON.stringify({ is_active: active })
                });

                if (res.ok) {
                    showToast(active ? '▶️ Ankieta aktywowana' : '⏸️ Ankieta dezaktywowana', 'success');
                    currentSurvey.is_active = active;
                    renderVotePanel();
                    renderResults(currentResults);
                } else {
                    const json = await res.json();
                    showToast(json.message || 'Błąd aktualizacji', 'error');
                }
            } catch {
                showToast('Błąd połączenia', 'error');
            }
        }

        function renderResults(data) {
            const section = document.getElementById('resultsSection');
            if (!section || !data) return;

            const gradients = ['bar-color-0', 'bar-color-1', 'bar-color-2', 'bar-color-3', 'bar-color-4', 'bar-color-5'];

            section.innerHTML = `
            <div class="results-header">
                <h3>📊 Wyniki <span class="live-badge">LIVE</span></h3>
                <span class="total-votes">${data.total_votes} głosów</span>
            </div>
            ${(data.options || []).map((opt, i) => `
                <div class="result-bar">
                    <div class="result-bar-header">
                        <span class="result-bar-label">${escHtml(opt.text)}</span>
                        <span class="result-bar-stats">
                            <span class="result-bar-pct">${opt.percentage}%</span>
                            · ${opt.vote_count} głosów
                        </span>
                    </div>
                    <div class="result-bar-track">
                        <div class="result-bar-fill ${gradients[i % gradients.length]}" style="width: ${opt.percentage}%"></div>
                    </div>
                </div>
            `).join('')}
        `;
        }

        function addOption() {
            optionCount++;
            const row = document.createElement('div');
            row.className = 'option-row';
            row.innerHTML = `
            <input type="text" placeholder="Opcja ${optionCount}" class="option-input">
            <button class="btn-remove" onclick="removeOption(this)">×</button>
        `;
            document.getElementById('optionsList').appendChild(row);
        }

        function removeOption(btn) {
            const list = document.getElementById('optionsList');
            if (list.children.length > 2) {
                btn.parentElement.remove();
            } else {
                showToast('Minimum 2 opcje', 'error');
            }
        }

        async function createSurvey() {
            const title = document.getElementById('surveyTitle').value.trim();
            const description = document.getElementById('surveyDesc').value.trim();
            const options = [...document.querySelectorAll('.option-input')]
                .map(i => i.value.trim())
                .filter(Boolean);

            if (!title) { showToast('Wpisz tytuł ankiety', 'error'); return; }
            if (options.length < 2) { showToast('Dodaj minimum 2 opcje', 'error'); return; }

            try {
                const res = await fetch(`${API_URL}/api/surveys`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...authHeaders()
                    },
                    body: JSON.stringify({ title, description, options })
                });

                if (res.ok) {
                    showToast('✅ Ankieta utworzona!', 'success');
                    document.getElementById('surveyTitle').value = '';
                    document.getElementById('surveyDesc').value = '';
                    document.getElementById('optionsList').innerHTML = `
                    <div class="option-row"><input type="text" placeholder="Opcja 1" class="option-input"><button class="btn-remove" onclick="removeOption(this)">×</button></div>
                    <div class="option-row"><input type="text" placeholder="Opcja 2" class="option-input"><button class="btn-remove" onclick="removeOption(this)">×</button></div>
                `;
                    optionCount = 2;
                    switchTab('surveys');
                } else {
                    const json = await res.json();
                    showToast(json.message || 'Błąd tworzenia', 'error');
                }
            } catch (err) {
                showToast('Błąd połączenia z serwerem', 'error');
            }
        }
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3500);
        }

        function escHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        initAuth();
    </script>
</body>
